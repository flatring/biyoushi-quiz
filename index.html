<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>美容師筆記試験クイズ｜第53回</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen">
    <div class="home-icon">💇</div>
    <h1 class="home-title">美容師筆記試験クイズ</h1>
    <select class="exam-select" id="exam-select"></select>
    <p class="version-label" id="version-label"></p>

    <div class="home-card">
        <div class="home-stats" id="home-stats">
            <span style="color:var(--text-sub);font-size:14px">読み込み中…</span>
        </div>
        <div class="home-group">
            <div class="order-toggle">
                <button id="toggle-random" class="active">ランダム順</button>
                <button id="toggle-sequential">番号順</button>
            </div>
            <button class="btn btn-primary" id="btn-all">全問モード</button>
            <button class="btn btn-secondary" id="btn-weak">苦手問題モード</button>
        </div>
        <div class="home-divider"></div>
        <button class="btn btn-outline" id="btn-dashboard">ダッシュボード</button>
    </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
    <div class="quiz-header">
        <div class="quiz-header-row">
            <button class="back-btn" id="quiz-back">←</button>
            <span class="progress-label" id="progress-label"></span>
            <span class="session-pct" id="session-pct"></span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <div class="quiz-body">
        <div id="quiz-content">
            <div class="subject-tag" id="q-subject"></div>
            <div class="question-card">
                <p class="question-text" id="q-text"></p>
                <div class="preamble" id="q-preamble" style="display:none"></div>
                <div id="q-image" style="display:none"></div>
            </div>
            <div class="choices-list" id="q-choices"></div>
            <div class="result-banner" id="result-banner">
                <span class="result-icon" id="result-icon"></span>
                <span id="result-msg"></span>
            </div>
            <button class="btn btn-primary" id="next-btn">次の問題へ →</button>
        </div>

        <div id="finish-content">
            <div class="finish-card">
                <div class="finish-emoji" id="finish-emoji"></div>
                <div class="finish-score" id="finish-score"></div>
                <div class="finish-detail" id="finish-detail"></div>
                <button class="btn btn-primary" id="finish-btn-all">もう一度（全問）</button>
                <button class="btn btn-secondary" id="finish-btn-weak">苦手問題のみ</button>
                <button class="btn btn-outline" id="finish-btn-dashboard">ダッシュボード</button>
            </div>
        </div>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="screen-dashboard" class="screen">
    <div class="dash-header">
        <button class="back-btn" id="dash-back">←</button>
        <h2 class="dash-title">ダッシュボード</h2>
    </div>
    <div class="dash-body" id="dash-body"></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
